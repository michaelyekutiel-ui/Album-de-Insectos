name: Keep Supabase Active

on:
  schedule:
    # Run twice a week on Monday and Thursday at 00:00 UTC
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets not set. Skipping ping."
            exit 0
          fi
          
          echo "Pinging Supabase to prevent pausing..."
          curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/rest/v1/insects?limit=1" \
          -H "apikey: ${SUPABASE_ANON_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          echo ""
          echo "Ping complete."
