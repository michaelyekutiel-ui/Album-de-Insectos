<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Album de Insectos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
    <!-- PWA Manifest (enables Add to Home Screen with no browser chrome) -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1710">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="glass-bg"></div>

    <header class="glass">
        <div class="header-content">
            <!-- Row 1: App title -->
            <div class="header-row-title">
                <h1>Album de Insectos</h1>
            </div>
            <!-- Row 2: Username + Logout (hidden when logged out) -->
            <div class="header-row-user">
                <div id="user-info" class="hidden">
                    <span id="user-email"></span>
                    <button id="logout-btn" class="text-btn">Logout</button>
                </div>
            </div>
            <!-- Row 3: Three controls — frame icon, Universal toggle, Group toggle -->
            <div class="header-row-controls">
                <button id="auth-btn" class="glass-btn">Sign In</button>
                <button id="frame-settings-btn" class="icon-btn hidden" title="Frame Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
                    </svg>
                </button>
                <div class="universal-toggle-container">
                    <span>Universal</span>
                    <label class="switch">
                        <input type="checkbox" id="universal-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="universal-toggle-container">
                    <span>Group</span>
                    <label class="switch">
                        <input type="checkbox" id="group-species-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </header>

    <!-- Framing Modal -->
    <div id="framing-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass framing-content">
            <button class="close-framing-btn close-btn">&times;</button>
            <h2 class="modal-title">Personalize Your Album</h2>
            <div class="framing-options">
                <div class="option-row">
                    <div class="option-label">
                        <strong>Frame Color</strong>
                        <span>Signature border for your cards</span>
                    </div>
                    <input type="color" id="frame-color-input" value="#4ade80">
                </div>

                <div class="option-row">
                    <div class="option-label">
                        <strong>Your User Icon</strong>
                        <span>Appears on your cards (Optional)</span>
                    </div>
                    <div class="upload-area" id="avatar-upload-area">
                        <p>Click to Upload Icon</p>
                        <input type="file" id="avatar-file-input" accept="image/*" hidden>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <p>Preview</p>
                <div class="frame-preview-box" id="frame-preview-box">
                    <div class="frame-wrapper" style="border-color: #4ade80">
                        <div class="preview-card-mock">
                            <img src="https://placehold.co/150" class="main-img" alt="Preview">
                            <div class="preview-icon-container">
                                <div id="avatar-preview" class="user-avatar-small">
                                    <span class="avatar-fallback">U</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button id="save-frame-btn" class="primary-btn">Save Personalization</button>
        </div>
    </div>

    <main id="album-grid" class="album-grid">
        <!-- Cards will be injected here -->
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass auth-content">
            <button class="close-auth-btn">&times;</button>
            <h2 id="auth-modal-title">Sign In</h2>
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="nature@lover.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="auth-submit-btn" class="primary-btn">Sign In</button>
            </form>
            <p class="auth-switch">
                Don't have an account? <a href="#" id="switch-auth-link">Sign Up</a>
            </p>
        </div>
    </div>

    <button id="surprise-btn" class="fab secondary-fab" aria-label="Surprise me with a rare insect">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
            </path>
        </svg>
    </button>

    <button id="add-insect-btn" class="fab" aria-label="Add new insect">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Search / Add Insect Modal -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Add New Insect</h2>
                <button class="close-btn">&times;</button>
            </div>

            <!-- Tab switcher -->
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="search">🔍 Search Web</button>
                <button class="tab-btn" data-tab="upload">📷 From Gallery</button>
            </div>

            <!-- Tab 1: Web Search (existing) -->
            <div id="search-tab" class="tab-panel">
                <div class="search-box">
                    <input type="text" id="insect-search-input"
                        placeholder="Search for an insect (e.g. Monarch Butterfly)...">
                    <button id="search-btn">Search</button>
                </div>
                <div id="search-results" class="results-grid">
                    <!-- Search results will appear here -->
                </div>
                <div id="selection-preview" class="hidden">
                    <div class="preview-container">
                        <div id="selected-images-container" class="preview-images"></div>
                        <div class="preview-info">
                            <p id="selected-insect-name"></p>
                            <button id="confirm-add-btn">Add to Album</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab 2: From Gallery (new) -->
            <div id="upload-tab" class="tab-panel hidden">
                <!-- Photo picker -->
                <div class="upload-area" id="insect-photo-upload-area">
                    <span class="upload-icon">📷</span>
                    <p>Tap to choose a photo from your gallery</p>
                    <input type="file" id="insect-photo-input" accept="image/*" hidden>
                </div>
                <!-- Preview of chosen photo -->
                <img id="upload-preview-img" class="upload-preview-img hidden" alt="Preview">
                <!-- Insect name input -->
                <div class="upload-name-row">
                    <div class="input-group">
                        <label for="upload-insect-name">Insect Name</label>
                        <input type="text" id="upload-insect-name" placeholder="e.g. Monarch Butterfly">
                    </div>
                    <button id="confirm-upload-btn" class="primary-btn" disabled>
                        Add to Album
                    </button>
                </div>
                <p id="upload-status" class="upload-status-msg hidden"></p>
            </div>
        </div>
    </div>

    <!-- Group Detail Modal -->
    <div id="group-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass group-content">
            <button class="close-group-btn close-btn">&times;</button>
            <h2 id="group-modal-title" class="modal-title"></h2>
            <div id="group-photo-grid" class="group-photo-grid">
                <!-- Group photos will be injected here -->
            </div>
        </div>
    </div>

    <script src="config.js?v=14"></script>
    <script src="main.js?v=20"></script>

    <!-- Photo Viewer Modal -->
    <div id="viewer-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content viewer-content glass">
            <button class="close-viewer-btn">&times;</button>
            <div class="viewer-image-container" id="zoom-container">
                <img id="viewer-image" src="" alt="Full size insect">
            </div>
            <div class="viewer-controls">
                <button id="zoom-out-btn" class="glass-btn icon-btn-small" title="Zoom Out">−</button>
                <button id="zoom-reset-btn" class="glass-btn" title="Reset Zoom">Reset</button>
                <button id="zoom-in-btn" class="glass-btn icon-btn-small" title="Zoom In">+</button>
            </div>
            <div class="viewer-footer">
                <h2 id="viewer-name"></h2>
            </div>
        </div>
    </div>

    <!-- Fullscreen button (only visible in landscape) -->
    <button id="fullscreen-btn" title="Fullscreen">⛶</button>

</body>

</html>
